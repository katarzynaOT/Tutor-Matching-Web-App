<div *ngIf="message" class="message">
  {{ message }}
</div>

<form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="box">

  <h2>Login</h2>

  <input
    name="email"
    [(ngModel)]="model.email"
    required
    type="email"
    placeholder="email"
  />

  <input
    name="password"
    [(ngModel)]="model.password"
    required
    type="password"
    placeholder="password (min. 6)"
  />

  <button type="submit">Login</button>

</form>
