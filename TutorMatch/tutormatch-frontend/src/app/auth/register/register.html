<div *ngIf="message" class="message">
  {{ message }}
</div>

<form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="box">

  <h2>Register</h2>

  <input
    name="name"
    [(ngModel)]="model.name"
    required
    placeholder="name (& surname)"
  />

  <input
    name="email"
    [(ngModel)]="model.email"
    required
    type="email"
    placeholder="email"
  />

  <input
    name="password"
    [(ngModel)]="model.password"
    required
    type="password"
    placeholder="password (min. 6)"
  />

  <select
    name="role"
    [(ngModel)]="model.role"
    required
  >
    <option value="" disabled selected>role</option>
    <option value="STUDENT">STUDENT</option>
    <option value="TUTOR">TUTOR</option>
  </select>

  <button type="submit">Register</button>

</form>
